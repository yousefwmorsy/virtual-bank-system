version: '3.8'

services:
  db:
    image: postgres:15-alpine  
    container_name: postgres_userDB
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin           
      POSTGRES_PASSWORD: password 
      POSTGRES_DB: userDB            
    ports:
      - "5432:5432"
    volumes:
      - pg_user_data:/var/lib/postgresql

volumes:
  pg_user_data: