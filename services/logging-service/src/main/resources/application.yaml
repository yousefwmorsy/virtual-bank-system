spring:
  application:
    name: logging-service
  datasource:
    url: jdbc:postgresql://logging-db:5432/logging_db
    username: logging_user
    password: logging_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: kafka-server:9092

    consumer:
      group-id: microservices-logs
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.value.default.type: com.ejadainternship.vbank.logging_service.dtos.LogItemDTO
        spring.json.use.type.headers: false