services:
  user-db:
    image: postgres
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    volumes: ["user_pgdata:/var/lib/postgresql"]
    ports: ["5051:5432"]

  account-db:
    image: postgres
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_pass
    volumes: ["account_pgdata:/var/lib/postgresql"]
    ports: ["5050:5432"]

  transaction-db:
    image: postgres
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_pass
    volumes: ["transaction_pgdata:/var/lib/postgresql"]

  service-registry:
    build: ./services/service-registry
    ports: [ "8761:8761" ]

  account-service:
    build: ./services/account-service
    depends_on: [account-db, service-registry]
    ports: ["8081:8080"]

  user-service:
    build: ./services/user-service
    depends_on: [user-db, service-registry]
    ports: ["8082:8080"]



volumes:
  user_pgdata:
  account_pgdata:
  transaction_pgdata: